# CD (Continuous Deployment) Workflow
# This workflow deploys your frontend and backend to Cloud Run using a JSON key.
name: CD - Deploy to Cloud Run (JSON Auth)

on:
  push:
    branches: [ "main" ]

# 'env' makes these variables available to all steps.
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.REGION }}            # Example: us-central1
  FRONTEND_SERVICE: frontend-app           # Your Cloud Run frontend service name
  BACKEND_SERVICE: backend-api             # Your Cloud Run backend service name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: "Step 1: Checkout Repository"
      uses: actions/checkout@v4

    # JSON KEY AUTHENTICATION (instead of Workload Identity Federation)
    # This uses the service account key stored in GitHub Secrets.
    - name: "Step 2: Authenticate to Google Cloud (JSON Key)"
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: "Step 3: Set up Cloud SDK (gcloud)"
      uses: google-github-actions/setup-gcloud@v2

    - name: "Step 4: Configure Docker for Artifact Registry"
      # Allows Docker to push images to Artifact Registry.
      run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

    # Build and push backend image
    - name: "Step 5: Build and Push Backend Image"
      run: |
        IMAGE_BACKEND=${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/backend:${{ github.sha }}
        docker build -t $IMAGE_BACKEND ./backend
        docker push $IMAGE_BACKEND

    # Build and push frontend image
    - name: "Step 6: Build and Push Frontend Image"
      run: |
        IMAGE_FRONTEND=${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/frontend:${{ github.sha }}
        docker build -t $IMAGE_FRONTEND ./frontend
        docker push $IMAGE_FRONTEND

    # Deploy backend to Cloud Run
    - name: "Step 7: Deploy Backend to Cloud Run"
      run: |
        gcloud run deploy ${BACKEND_SERVICE} \
          --image=${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/backend:${{ github.sha }} \
          --region=${REGION} \
          --platform=managed \
          --allow-unauthenticated

    # Deploy frontend to Cloud Run
    - name: "Step 8: Deploy Frontend to Cloud Run"
      run: |
        gcloud run deploy ${FRONTEND_SERVICE} \
          --image=${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/frontend:${{ github.sha }} \
          --region=${REGION} \
          --platform=managed \
          --allow-unauthenticated

