name: CD - Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  FRONTEND_SERVICE: frontend-app
  BACKEND_SERVICE: backend-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Authorize Docker push'
      run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

    - name: 'Build and Push Backend'
      run: |
        docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/backend:${{ github.sha }} ./backend
        docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/backend:${{ github.sha }}

    - name: 'Build and Push Frontend'
      run: |
        docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/frontend:${{ github.sha }} ./frontend
        docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/containers/frontend:${{ github.sha }}

    - name: 'Deploy Backend to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.BACKEND_SERVICE }}'
        image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/containers/backend:${{ github.sha }}'
        region: '${{ env.REGION }}'

    - name: 'Deploy Frontend to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.FRONTEND_SERVICE }}'
        image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/containers/frontend:${{ github.sha }}'
        region: '${{ env.REGION }}'
